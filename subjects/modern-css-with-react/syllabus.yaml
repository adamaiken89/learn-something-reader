subject: "Modern CSS with React"
language: en
time_budget_hours: 35
target_level: intermediate
domain: web development
prerequisites:
  - React basics (JSX, hooks, props, state)
  - Basic CSS (selectors, properties, values)
learning_objectives:
  - Evaluate CSS approaches in React and choose appropriately per project
  - Implement theming system for React component libraries
  - Avoid common CSS anti-patterns in component architecture
  - Test CSS in React apps effectively
  - Build production-ready styled React components

modules:
  - id: 1
    name: "CSS Landscape 2026 — React Edition"
    time_hours: 2.5
    prerequisites: []
    topics: [css-approaches, decision-framework, react-compatibility, RSC, SSR, hybrid-strategy]

  - id: 2
    name: "Plain CSS & Sass in React"
    time_hours: 2
    prerequisites: [1]
    topics: [global-stylesheets, BEM, sass-mixins, design-tokens, react-integration]

  - id: 3
    name: "CSS Modules in React"
    time_hours: 2.5
    prerequisites: [1, 2]
    topics: [css-modules, scoped-classes, composition, typescript, nextjs, vite]

  - id: 4
    name: "Runtime CSS-in-JS (styled-components) in React"
    time_hours: 2.5
    prerequisites: [1, 3]
    topics: [styled-components, emotion, theme-provider, SSR-cost, RSC-compat, migration-strategy]

  - id: 5
    name: "Zero-Runtime CSS-in-JS in React"
    time_hours: 2
    prerequisites: [1, 4]
    topics: [vanilla-extract, linaria, pandacss, build-time, react-patterns]

  - id: 6
    name: "Tailwind CSS with React"
    time_hours: 3
    prerequisites: [1, 3]
    topics: [tailwind-config, jsx-classnames, conditional-classes, component-abstraction, clsx, scale-limits]

  - id: 7
    name: "Anti-Patterns — Override in React Component Model"
    time_hours: 2.5
    prerequisites: [2, 3, 4, 6]
    topics: [specificity-wars, styled-override, prop-override, composition-patterns]

  - id: 8
    name: "Theming React Components with CSS"
    time_hours: 3
    prerequisites: [7]
    topics: [css-custom-properties, react-context, theme-provider, scope, multi-theme]

  - id: 9
    name: "Layout Components with Flexbox & Grid"
    time_hours: 2
    prerequisites: [1, 3]
    topics: [flex, grid, layout-primitives, component-api, responsive-props]

  - id: 10
    name: "Container Queries & Responsive React Components"
    time_hours: 2
    prerequisites: [9]
    topics: [container-type, container-queries, component-responsiveness, viewport-independence]

  - id: 11
    name: "Animations in React with CSS"
    time_hours: 2
    prerequisites: [3, 4]
    topics: [keyframes, transition, react-lifecycle, view-transitions-api]

  - id: 12
    name: "CSS Testing in React Apps"
    time_hours: 2.5
    prerequisites: [7, 8]
    topics: [visual-regression, playwright, chromatic, unit-tests, a11y-audit]

  - id: 13
    name: "Utility Libraries for React CSS"
    time_hours: 2
    prerequisites: [3, 6]
    topics: [clsx, classnames, tailwind-merge, cva, clsx, bundle-cost]

  - id: 14
    name: "Performance & CSS Bundle in React"
    time_hours: 2
    prerequisites: [5, 6, 13]
    topics: [critical-css, code-split, unused-css, css-containment, nextjs-vite]

  - id: 15
    name: "Capstone — Production React Component Library"
    time_hours: 3
    prerequisites: [8, 12, 13, 14]
    topics: [integration, themed-components, testing, performance]

  - id: 16
    name: "Hybrid CSS Architecture — Combining Approaches"
    time_hours: 3
    prerequisites: [2, 3, 4, 5, 6]
    topics: [layer-architecture, compatibility-matrix, performance-budgeting, css-libraries-cost, case-studies]

  - id: 17
    name: "Migration & Gradual Adoption Strategies"
    time_hours: 2
    prerequisites: [16]
    topics: [incremental-migration, coexistence-patterns, design-token-extraction, team-workflow]
